name: budgetro
description: "Personal Finance Accounting App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  json_annotation: ^4.12.0
  cupertino_icons: ^1.0.8
  go_router: ^17.2.3
  fpdart: ^1.2.0
  flutter_dotenv: ^6.0.1
  http: ^1.6.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  retrofit: ^4.9.2
  dio: ^5.9.2
  injectable: ^3.0.0
  get_it: ^9.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.15.0
  flutter_lints: ^6.0.0
  json_serializable: ^6.14.0
  mockito: ^5.6.4
  retrofit_generator: ^10.2.6
  injectable_generator: ^3.0.2

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - .env

  fonts:
    - family: Quicksand
      fonts:
        - asset: assets/fonts/Quicksand-Regular.ttf
        - asset: assets/fonts/Quicksand-Medium.ttf
        - asset: assets/fonts/Quicksand-Bold.ttf

flutter_launcher_icons: 
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  remove_alpha_ios: true
