syntax = "proto3";

package auth.v1;

service AuthService {
  rpc SignUp(SignUpRequest) returns (SignUpResponse);
  rpc LogIn(LogInRequest) returns (LogInResponse);
  rpc SendOtp(SendOtpRequest) returns (SendOtpResponse);
  rpc VerifyOtp(VerifyOtpRequest) returns (VerifyOtpResponse);
  rpc Refresh(RefreshRequest) returns (RefreshResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
}

message SignUpRequest {
  string identifier = 1;
  string identifier_type = 2;
  string password = 3;
}

message SignUpResponse { bool ok = 1; }

message LogInRequest {
  string identifier = 1;
  string identifier_type = 2;
  string password = 3;
}

message LogInResponse {
  string access_token = 1;
  string refresh_token = 2;
}
message SendOtpRequest {
  string identifier = 1;
  string identifier_type = 2;
}

message SendOtpResponse { bool ok = 1; }

message VerifyOtpRequest {
  string identifier = 1;
  string identifier_type = 2;
  string code = 3;
}

message VerifyOtpResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message RefreshRequest { string refresh_token = 1; }

message RefreshResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message LogoutRequest { string refresh_token = 1; }

message LogoutResponse { bool ok = 1; }
